$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: Icon
description: SVG icon component. Both props and slots.
props:
  type: object
  properties:
    name:
      type: string
      description: Icon identifier name
    size:
      type: string
      description: "Icon size: sm, md, lg"
  required:
    - name
slots:
  label:
    title: Label
    description: Accessible label for the icon
